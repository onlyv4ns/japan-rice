[module/round-left]
type = custom/text
content = %{T3} %{T-}
content-foreground = #2b2f37

[module/round-right]
type = custom/text
content = %{T3}%{T-}
content-foreground = #2b2f37

[module/logo]
type = custom/text
content = %{T4}侍%{T-}
content-foreground = ${colors.jp-accent}
content-padding = 1
click-left = rofi -show drun

[module/focused_app]
type = custom/script
exec = $HOME/bin/focused_app --watch
tail = true
format-padding = 1
format-foreground = ${colors.jp-muted}

[module/quote]
type = custom/text
content = %{T4}生き甲斐を見つける。%{T-} %{F#5b6270}find your ikigai.%{F-}
content-foreground = ${colors.jp-text}
content-padding = 1

[module/temperature]
type = internal/temperature
thermal-zone = 0
warn-temperature = 70

format = <ramp> <label>
format-warn = <ramp> <label-warn>
format-padding = 0 
label = %temperature%
label-warn = %temperature%
ramp-0 = ""
ramp-foreground = #a4ebf3

[module/bspwm]
type = internal/bspwm

pin-workspaces = true
inline-mode = true
enable-click = true
enable-scroll = true
reverse-scroll = false

format = <label-state>
ws-icon-0 = 1;1
ws-icon-1 = 2;2
ws-icon-2 = 3;3
ws-icon-3 = 4;4
ws-icon-4 = 5;5

label-focused = %icon%
label-focused-foreground = ${colors.jp-bg}
label-focused-background = ${colors.jp-accent}
label-focused-padding = 1

label-occupied = %icon%
label-occupied-foreground = ${colors.jp-muted}
label-occupied-padding = 1

label-empty = %icon%
label-empty-foreground = ${colors.jp-muted}
label-empty-padding = 1

label-urgent = %icon%
label-urgent-foreground = ${colors.jp-bg}
label-urgent-background = ${colors.jp-accent}
label-urgent-padding = 1

[module/volume]
type = custom/script
exec = $HOME/bin/volume --status
interval = 1
click-left = $HOME/bin/volume --toggle
scroll-up = $HOME/bin/volume --up
scroll-down = $HOME/bin/volume --down
format-padding = 1
format-foreground = ${colors.jp-green}

[module/time]
type = internal/date
interval = 60
format = <label>
format-padding = 1
format-foreground = ${colors.jp-accent}
time = %H:%M
label =  %time%

[module/memory]
type = internal/memory
interval = 2
format = <label>
format-padding = 1
format-foreground = ${colors.jp-orange}
label = RAM %percentage_used%%

[module/gpu]
type = custom/script
exec = echo "GPU $(cat /sys/class/drm/card*/device/gpu_busy_percent 2>/dev/null | head -1)%"
interval = 2
format-padding = 1
format-foreground = ${colors.jp-purple}

[module/filesystem]
type = custom/text 
content =" " 
content-padding =1
click-left = rofi -show drun
content-foreground =  #61afef

[module/wlan]
type = internal/network
interface = wlan0
interval = 3.0
format-connected =  <label-connected>
label-connected = "%{A1:sh $HOME/bin/wifimenu:} %{A}"
label-connected-foreground = ${colors.jp-blue} 
format-disconnected = <label-disconnected>
label-disconnected = "%{A1:sh $HOME/bin/wifimenu:}󰖪 %{A}"
label-disconnected-foreground = #D35F5E

[module/ethernet]
type = internal/network
interface = enp6s0
interval = 2
format-connected = <label-connected>
format-connected-padding = 1
format-connected-foreground = ${colors.jp-teal}
label-connected = ↓ %downspeed% ↑ %upspeed%
format-disconnected = <label-disconnected>
format-disconnected-padding = 1
format-disconnected-foreground = ${colors.jp-teal}
label-disconnected = ↓ -- ↑ --

[module/battery]
type = internal/battery
full-at = 98
low-at = 10

battery = BAT0
adapter = ACAD
poll-interval = 5

time-format = %H:%M
format-charging = <animation-charging> <label-charging>
format-discharging = <ramp-capacity> <label-discharging>
format-full = <ramp-capacity> <label-full>
format-low = <label-low> <animation-low>

label-charging = "%percentage%% "
label-discharging = "%percentage%% "
label-full = " 100% "
label-low = "%percentage% "

ramp-capacity-0 = " "
ramp-capacity-1 = " "
ramp-capacity-2 = " "
ramp-capacity-3 = " "
ramp-capacity-4 = " "
bar-capacity-width = 10

animation-charging-0 = " "
animation-charging-1 = " "
animation-charging-2 = " "
animation-charging-3 = " "
animation-charging-4 = " "
animation-charging-framerate = 910

animation-discharging-0 = " "
animation-discharging-1 = " "
animation-discharging-2 = " "
animation-discharging-3 = " "
animation-discharging-4 = " "
animation-discharging-framerate = 500

animation-low-0 = "  "
animation-low-1 = "  "
animation-low-framerate = 1500

animation-low-foreground = #D35F5D
format-charging-foreground = ${colors.jp-text2}
label-charging-foreground = ${colors.jp-text2}
format-discharging-foreground = ${colors.jp-text2}
label-discharging-foreground = ${colors.jp-text2}
format-full-prefix-foreground = ${colors.jp-text2}
format-foreground = ${colors.jp-text2}
ramp-capacity-foreground = ${colors.jp-text2}
animation-charging-foreground = ${colors.jp-text2}

[module/backlight]
type = internal/backlight
card = amdgpu_bl2
use-actual-brightness = true
enable-scroll = true
scroll-interval = 5
format = <label>
format-prefix = "  "
format-prefix-foreground = #61afef
format-padding = 1

[module/powermenu]
type = custom/text 
content =" " 
content-padding = 1
click-left = sh $HOME/bin/powermenu &
content-foreground = ${colors.jp-text2}

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = " " 
format = <label>
label = %percentage%%
format-foreground = #989cff

[module/xwindow]
type = internal/xwindow
label = %title:0:30:...

[module/space]
type = custom/text
content = " "

[module/sep]
type = custom/text
content = %{F#4b4f5a}│%{F-}
content-padding = 1

[module/xkeyboard]
type = internal/xkeyboard
blacklist-0 = num lock
blacklist-1 = scroll lock
format = <label-layout> <label-indicator>
label-layout-padding = 1
label-layout-foreground = #fff
label-indicator-on = %name%
layout-icon-default = some-icon
layout-icon-0 = ru
layout-icon-1 = us
label-indicator-on-capslock = !
label-indicator-off-capslock =
