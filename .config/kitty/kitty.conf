## ─── Tokyo Night Dark (bspwm rice) ────────────────────────────

font_family      JetBrainsMono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        9.0

window_padding_width 12
hide_window_decorations yes
confirm_os_window_close 0

background_opacity 1.0

cursor_shape           beam
cursor_blink_interval   0.5
cursor_trail            1

tab_bar_edge      top
tab_bar_style     powerline
tab_powerline_style slanted
tab_bar_min_tabs  1
active_tab_font_style   bold

scrollback_lines 10000
enable_audio_bell no
allow_remote_control yes

# ─── colors: Tokyo Night Dark ──────────────────────────────────
foreground              #c0caf5
background              #1a1b26
selection_foreground    #1a1b26
selection_background    #ff5e7d

cursor                  #ff5e7d
cursor_text_color       #1a1b26

url_color               #7aa2f7

active_border_color     #ff5e7d
inactive_border_color   #3b4261

active_tab_foreground   #1a1b26
active_tab_background   #ff5e7d
inactive_tab_foreground #a9b1d6
inactive_tab_background #1f2335

# black
color0  #15161e
color8  #414868
# red
color1  #f7768e
color9  #f7768e
# green
color2  #9ece6a
color10 #9ece6a
# yellow
color3  #e0af68
color11 #e0af68
# blue
color4  #7aa2f7
color12 #7aa2f7
# magenta
color5  #bb9af7
color13 #bb9af7
# cyan
color6  #7dcfff
color14 #7dcfff
# white
color7  #a9b1d6
color15 #c0caf5

# ─── keybindings ────────────────────────────────────────────────
map ctrl+shift+enter new_window
map ctrl+shift+w close_window
map ctrl+shift+t new_tab
map ctrl+shift+right next_tab
map ctrl+shift+left prev_tab
